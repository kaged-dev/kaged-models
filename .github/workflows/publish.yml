name: Build and publish models catalog

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      bump_submodule:
        description: "Bump the models.dev submodule to latest origin/dev before building"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: "models-publish"
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure git
        run: |
          git config --global user.name "Karasu"
          git config --global user.email "karasu@kaged.dev"

      - name: Bump models.dev submodule
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.bump_submodule)
        run: |
          bun run bump

      - name: Install dependencies
        run: |
          bun install
          cd vendor/models.dev && bun install

      - name: Build catalog
        run: bun run build

      - name: Publish to models branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: models
          publish_dir: ./dist
          user_name: "Karasu"
          user_email: "karasu@kaged.dev"
          commit_message: "publish catalog from ${{ github.sha }}"
          force_orphan: true
